name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_NAME: NotchFlow
  SCHEME: NotchFlow

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          # Create keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$CERT_PATH"

          security import "$CERT_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}"

      - name: Build archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -archivePath "build/${{ env.PROJECT_NAME }}.xcarchive" \
            -destination "generic/platform=macOS" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application: Fadi Al Zuabi ($APPLE_TEAM_ID)"

      - name: Create export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

      - name: Export signed app
        run: |
          xcodebuild -exportArchive \
            -archivePath "build/${{ env.PROJECT_NAME }}.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist "build/ExportOptions.plist"

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R "build/export/${{ env.PROJECT_NAME }}.app" build/dmg/
          ln -s /Applications build/dmg/Applications

          hdiutil create -volname "${{ env.PROJECT_NAME }}" \
            -srcfolder build/dmg \
            -ov \
            -format UDZO \
            "build/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="build/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Calculate SHA256
        id: sha
        run: |
          DMG_PATH="build/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}.dmg"
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: build/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}.dmg
          body: |
            ## NotchFlow v${{ steps.version.outputs.VERSION }}

            ### Installation

            **Via Homebrew (recommended):**
            ```bash
            brew install --cask notchflow
            ```

            **Manual:**
            1. Download the DMG from this release
            2. Open the DMG and drag NotchFlow to Applications
            3. Launch from Applications

            ### Checksums
            ```
            SHA256: ${{ steps.sha.outputs.SHA256 }}
            ```

            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - MacBook with notch (or any Mac for floating mode)
          draft: false
          prerelease: false

      - name: Output Homebrew info
        env:
          HOMEBREW_SHA256: ${{ steps.sha.outputs.SHA256 }}
        run: |
          echo "============================================"
          echo "Homebrew Cask SHA256:"
          echo "sha256 \"$HOMEBREW_SHA256\""
          echo "============================================"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true
